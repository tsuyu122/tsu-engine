<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Black background matching the engine splash screen -->
  <circle cx="100" cy="100" r="100" fill="#000000"/>

  <!-- Outer ring  (radius 90, stroke 12 — matches DrawEngineLogo source) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="12"/>

  <!-- Left eye  (cx-35, cy-20, r14) -->
  <circle cx="65" cy="80" r="14" fill="white"/>

  <!-- Right eye  (cx+35, cy-20, r14) -->
  <circle cx="135" cy="80" r="14" fill="white"/>

  <!-- Smile arc: radius 60, 10deg -> 170deg clockwise (Y-down)          -->
  <!--   start = (100 + 60*cos10,  100 + 60*sin10)  = (159.09, 110.42)  -->
  <!--   end   = (100 + 60*cos170, 100 + 60*sin170) = ( 40.91, 110.42)  -->
  <path d="M 159.09 110.42 A 60 60 0 0 1 40.91 110.42"
        fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
</svg>
